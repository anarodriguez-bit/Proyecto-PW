
{% extends 'base.html' %}
{% block title %}Eliminar Carrera – Control Escolar{% endblock %}

{% block content %}
<div class="mb-4">
    <a href="{% url 'carrera_lista' %}" class="text-decoration-none text-muted small">
        <i class="bi bi-arrow-left me-1"></i>Regresar a Carreras
    </a>
    <h2 class="fw-bold mt-1 text-danger"><i class="bi bi-trash me-2"></i>Eliminar Carrera</h2>
</div>

<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar eliminación
            </div>
            <div class="card-body text-center py-4">
                <p class="fs-5">¿Deseas eliminar el registro:</p>
                <p class="fw-bold fs-5 text-danger">{{ objeto }}</p>
                <p class="text-muted small">Esta acción <strong>no se puede deshacer</strong>.</p>
                <form method="post" class="d-flex justify-content-center gap-3 mt-3">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger px-4">
                        <i class="bi bi-trash me-1"></i>Sí, eliminar
                    </button>
                    <a href="{% url 'carrera_lista' %}" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
